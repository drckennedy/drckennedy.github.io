  {id:1,title:"EOQ Reorder Calculation – Inconel 718 & Titanium Alloys",category:"Procurement",icon:"📦",recurring:true,desc:"Monthly reorder calculations for 47 raw materials including Inconel 718, titanium alloys, and carbon composites. Inputs are fixed formulas with stable demand data pulled directly from our ERP system. Runs daily.",complexity:"Low",volume:"High (47 materials, daily runs)",safety:"None",context:"Pure formula-based calculation. EOQ = √(2DS/H). Data is structured, deterministic, no ambiguity.",rec:"automation",insight:"Basic automation is ideal here — this is textbook EOQ math with structured inputs. Using an AI Agent wastes token budget and generates unnecessary energy and water costs for compute a spreadsheet formula handles perfectly. Human time is far too valuable for repetitive arithmetic.",costs:{ai:{token:0.42,energy:0.038,water:1.90,capital:120,labor:0,speed:2,err:2,job:-2,qual:92},automation:{token:0,energy:0.002,water:0.05,capital:800,labor:0,speed:0.5,err:1,job:-1,qual:99},augmented:{token:0.20,energy:0.018,water:0.75,capital:400,labor:10,speed:3,err:1.5,job:1,qual:97},human:{token:0,energy:0,water:0,capital:0,labor:68,speed:45,err:3,job:3,qual:95}}},
  {id:2,title:"Kanban Work Order Status Updates – Assembly Line 3",category:"Workflow",icon:"📋",recurring:true,desc:"Workers on Assembly Line 3 have completed 12 work orders. Each completion must be logged in our MES, the Kanban card moved to 'Done', and the downstream queue triggered automatically.",complexity:"Low",volume:"Medium (12 updates, multiple times daily)",safety:"None",context:"Pure system state transitions triggered by completion events. If/then logic only.",rec:"automation",insight:"Event-triggered rule-based automation handles this perfectly. An AI Agent is gross overkill — paying tokens for glorified button clicks. This pattern has been automatable since the 1980s.",costs:{ai:{token:0.28,energy:0.025,water:1.20,capital:80,labor:0,speed:1,err:1,job:-2,qual:94},automation:{token:0,energy:0.001,water:0.02,capital:400,labor:0,speed:0.1,err:0.5,job:-1,qual:99},augmented:{token:0.15,energy:0.012,water:0.50,capital:200,labor:5,speed:2,err:0.8,job:1,qual:97},human:{token:0,energy:0,water:0,capital:0,labor:32,speed:8,err:4,job:3,qual:91}}},
  {id:3,title:"Turbine Blade Post-Machining Inspection – QC Gate 4",category:"Quality Control",icon:"🔍",recurring:true,desc:"Post-machining inspection of turbine blades for micro-cracks, surface finish defects, and dimensional tolerances. Each batch is approximately 200 blades. Results feed into flight certification records that must comply with AS9100 and FAA Part 21.",complexity:"High",volume:"Medium (200 blades/batch, 3 batches/week)",safety:"Critical — flight safety",context:"Defects can be subtle. Regulatory sign-off legally requires a certified inspector. AI vision can assist as a screening layer but cannot replace human sign-off on flight-critical parts.",rec:"human",insight:"Flight-critical inspection requires certified human inspectors — full stop. AS9100 and FAA regulations mandate human sign-off. Automating final judgment here creates catastrophic liability.",costs:{ai:{token:2.80,energy:0.22,water:11.0,capital:45000,labor:0,speed:25,err:6,job:-2,qual:79},automation:{token:0,energy:0.18,water:1.0,capital:120000,labor:0,speed:20,err:8,job:-1,qual:72},augmented:{token:1.80,energy:0.16,water:8.0,capital:35000,labor:160,speed:100,err:1.8,job:1,qual:96},human:{token:0,energy:0,water:0,capital:0,labor:280,speed:180,err:2,job:3,qual:97}}},
  {id:4,title:"Supplier Contract Negotiation – Titanium Vendor Price Dispute",category:"Procurement",icon:"🤝",recurring:false,desc:"Our primary titanium supplier is requesting a 14% price increase. We need to negotiate terms for our 3-year supply agreement covering $2.4M annually. This relationship spans 11 years.",complexity:"High",volume:"Low (one-time, high stakes)",safety:"Low",context:"Requires relationship management, strategic trade-offs, legal nuance, real-time reading of counterparty signals, and trust built over years.",rec:"human",insight:"AI can prep talking points, but the negotiation itself demands human relationship intelligence and accountability. Eleven years of relationship equity cannot be automated.",costs:{ai:{token:3.50,energy:0.31,water:15.5,capital:200,labor:0,speed:40,err:15,job:-2,qual:58},automation:{token:0,energy:0,water:0,capital:0,labor:0,speed:0,err:99,job:-1,qual:5},augmented:{token:2.00,energy:0.18,water:9.0,capital:300,labor:450,speed:420,err:7,job:1,qual:82},human:{token:0,energy:0,water:0,capital:0,labor:640,speed:480,err:5,job:3,qual:92}}},
  {id:5,title:"Weld Anomaly Detection – Combustion Chamber Ultrasonic Data",category:"Quality Control",icon:"📡",recurring:true,desc:"Real-time ultrasonic inspection of combustion chamber welds generates approximately 850,000 data points per shift. We need to flag anomalies for human engineer review.",complexity:"Medium",volume:"Very High (850K data points/shift)",safety:"High",context:"AI as a screening and triage layer — NOT as final decision maker. Human engineers review all flagged anomalies.",rec:"augmented",insight:"Textbook Augmented Human: AI handles pattern recognition at massive scale, while engineers make every final call. Pure AI without human oversight creates unacceptable liability on flight-critical hardware.",costs:{ai:{token:8.40,energy:0.85,water:42.5,capital:15000,labor:0,speed:8,err:6,job:-2,qual:83},automation:{token:0,energy:0.12,water:0.8,capital:80000,labor:85,speed:10,err:12,job:-1,qual:78},augmented:{token:6.00,energy:0.60,water:30.0,capital:12000,labor:55,speed:9,err:1.5,job:1,qual:98},human:{token:0,energy:0,water:0,capital:0,labor:1200,speed:720,err:18,job:3,qual:62}}},
  {id:6,title:"AS9100 Monthly Quality Management Report",category:"Compliance",icon:"📄",recurring:true,desc:"Monthly AS9100 quality management report due to our certification body. Data is pulled from our QMS, formatted per a fixed template, and reviewed and signed by the Quality Manager before submission.",complexity:"Medium",volume:"Low (monthly, structured template)",safety:"Low",context:"Structured data in → structured formatted output. Standard template exists. Human sign-off required regardless of generation method.",rec:"automation",insight:"A well-built report automation template beats AI at a fraction of the cost. The Quality Manager must review and sign regardless, so the generation step should be as cheap and reliable as possible.",costs:{ai:{token:1.85,energy:0.16,water:8.2,capital:500,labor:45,speed:15,err:4,job:-2,qual:88},automation:{token:0,energy:0.003,water:0.1,capital:2500,labor:45,speed:8,err:2,job:-1,qual:94},augmented:{token:1.20,energy:0.10,water:5.0,capital:800,labor:35,speed:12,err:2,job:1,qual:93},human:{token:0,energy:0,water:0,capital:0,labor:320,speed:240,err:5,job:3,qual:90}}},
  {id:7,title:"Engine Hot-Fire Test Failure Root Cause Analysis",category:"Engineering",icon:"🔥",recurring:false,desc:"Hot-fire test #47 produced anomalous chamber pressure readings followed by a turbopump stall at T+4.2s. We need formal root cause analysis before the program can continue. The test stand is currently down.",complexity:"Very High",volume:"Low (one incident, complex)",safety:"Critical",context:"Requires multi-disciplinary engineering expertise, physical intuition, hypothesis generation, and personal accountability.",rec:"human",insight:"RCA of a safety-critical failure demands your best credentialed engineers. No AI system can be named as the responsible engineer on a failure investigation.",costs:{ai:{token:12.5,energy:1.10,water:55.0,capital:800,labor:0,speed:120,err:22,job:-2,qual:61},automation:{token:0,energy:0,water:0,capital:0,labor:0,speed:0,err:99,job:-1,qual:3},augmented:{token:9.0,energy:0.80,water:40.0,capital:1000,labor:2400,speed:2400,err:5,job:1,qual:95},human:{token:0,energy:0,water:0,capital:0,labor:3200,speed:2880,err:8,job:3,qual:94}}},
  {id:8,title:"Inventory Reorder Point Alerts – 312 Tracked Components",category:"Inventory",icon:"🔔",recurring:true,desc:"When inventory of any of our 312 tracked components drops to its reorder point, we need to automatically trigger a purchase request and alert the procurement team.",complexity:"Low",volume:"High (312 items, continuous monitoring)",safety:"None",context:"Pure threshold comparison: if stock ≤ reorder point, fire alert and create PR.",rec:"automation",insight:"Textbook automation — this is literally just an if-statement running continuously. Using AI wastes token budget, energy, and water for absolutely zero added value.",costs:{ai:{token:1.20,energy:0.10,water:5.1,capital:300,labor:0,speed:1,err:1,job:-2,qual:96},automation:{token:0,energy:0.001,water:0.02,capital:600,labor:0,speed:0.1,err:0.2,job:-1,qual:99.5},augmented:{token:0.70,energy:0.05,water:2.5,capital:400,labor:10,speed:1,err:0.5,job:1,qual:99},human:{token:0,energy:0,water:0,capital:0,labor:48,speed:30,err:6,job:3,qual:88}}},
  {id:9,title:"EPQ Optimization – 18 Injector Plate Production Variants",category:"Production Planning",icon:"⚙️",recurring:true,desc:"Determine optimal production run quantities for 18 injector plate variants, balancing setup costs ($4,200/run), holding costs, and demand variability across three rocket programs.",complexity:"Medium",volume:"Medium (18 variants, monthly planning)",safety:"None",context:"EPQ formula with demand variability. More complex than EOQ but still solvable via operations research algorithms.",rec:"automation",insight:"EPQ with demand variability is still well within automation's reach using standard OR solvers. AI adds negligible value over a properly configured solver at orders of magnitude higher environmental cost.",costs:{ai:{token:0.95,energy:0.08,water:4.2,capital:400,labor:30,speed:10,err:3,job:-2,qual:90},automation:{token:0,energy:0.005,water:0.15,capital:3500,labor:30,speed:3,err:1.5,job:-1,qual:96},augmented:{token:0.55,energy:0.05,water:2.0,capital:2000,labor:20,speed:5,err:1,job:1,qual:97},human:{token:0,energy:0,water:0,capital:0,labor:240,speed:180,err:7,job:3,qual:85}}},
  {id:10,title:"Workplace Safety Incident Documentation – Machinist Laceration",category:"Safety & HR",icon:"🦺",recurring:false,desc:"A machinist sustained a laceration requiring medical treatment. Per OSHA 29 CFR 1904, a formal incident report must be completed, root cause identified, corrective actions documented, and the injured worker personally checked on.",complexity:"Medium",volume:"Low (incident-based)",safety:"High (OSHA compliance, worker welfare)",context:"Requires empathy, accurate witness accounts, legal accuracy, and genuine organizational care for the injured worker.",rec:"human",insight:"A human was hurt. The investigation must be human-led for legal, ethical, and cultural reasons. Using AI signals to your workforce that their safety is an automation problem.",costs:{ai:{token:1.60,energy:0.14,water:7.1,capital:200,labor:0,speed:30,err:12,job:-2,qual:62},automation:{token:0,energy:0,water:0,capital:0,labor:0,speed:0,err:99,job:-1,qual:5},augmented:{token:1.00,energy:0.09,water:4.5,capital:200,labor:180,speed:90,err:5,job:1,qual:84},human:{token:0,energy:0,water:0,capital:0,labor:280,speed:120,err:4,job:3,qual:95}}},
  {id:11,title:"Predictive Maintenance – CNC Machining Centers",category:"Maintenance",icon:"🔧",recurring:true,desc:"Vibration, temperature, and spindle load data streams continuously from 8 CNC machining centers. Goal: identify machines likely to fail within 72 hours. One unplanned downtime event costs $50K–$200K.",complexity:"High",volume:"Very High (continuous multi-sensor streams)",safety:"Medium",context:"Pattern recognition on high-frequency time-series data at scale. AI predicts; maintenance teams schedule and act.",rec:"augmented",insight:"One prevented downtime event pays for the system for a full year. Augmented is the right model: AI as the signal processor, human as the maintenance authority.",costs:{ai:{token:6.20,energy:0.55,water:27.5,capital:25000,labor:0,speed:5,err:10,job:-2,qual:84},automation:{token:0,energy:0.08,water:0.5,capital:60000,labor:40,speed:5,err:25,job:-1,qual:68},augmented:{token:4.80,energy:0.42,water:21.0,capital:20000,labor:25,speed:5,err:4,job:1,qual:95},human:{token:0,energy:0,water:0,capital:0,labor:960,speed:720,err:30,job:3,qual:55}}},
  {id:12,title:"Vendor Invoice 3-Way Match Reconciliation",category:"Finance",icon:"💳",recurring:true,desc:"Match 340 vendor invoices against purchase orders and goods receipt records. Flag discrepancies for AP team review. Standard 3-way match: Invoice = PO = Receipt. Monthly close cycle.",complexity:"Low",volume:"High (340 invoices, monthly)",safety:"None",context:"Structured data, deterministic rules. Three-way match has been a standard automation use case since the 1990s.",rec:"automation",insight:"3-way match reconciliation is a canonical automation use case. Paying AI tokens to compare numbers on invoices against numbers in a database is pure waste.",costs:{ai:{token:2.10,energy:0.19,water:9.4,capital:500,labor:60,speed:25,err:2,job:-2,qual:94},automation:{token:0,energy:0.004,water:0.12,capital:1200,labor:60,speed:5,err:0.5,job:-1,qual:99},augmented:{token:1.40,energy:0.12,water:6.0,capital:600,labor:30,speed:12,err:0.8,job:1,qual:98},human:{token:0,energy:0,water:0,capital:0,labor:680,speed:420,err:4,job:3,qual:93}}},
  {id:13,title:"Production Schedule Re-sequencing After Supply Disruption",category:"Production Planning",icon:"📅",recurring:false,desc:"A fastener supplier failure has cascaded across 3 production lines. 47 work orders need re-sequencing considering machine capacity, labor, lead times, and delivery commitments to 4 customers.",complexity:"Very High",volume:"Medium (47 orders, time-sensitive)",safety:"Low",context:"Combinatorial optimization with real-world soft constraints, customer relationship implications, and incomplete information.",rec:"augmented",insight:"AI can model dozens of re-sequencing scenarios in minutes. But the final decision must be owned by a human who knows which customers can flex and which contracts have penalty clauses.",costs:{ai:{token:5.80,energy:0.52,water:25.8,capital:1000,labor:0,speed:60,err:12,job:-2,qual:78},automation:{token:0,energy:0.04,water:0.3,capital:15000,labor:240,speed:120,err:18,job:-1,qual:70},augmented:{token:4.20,energy:0.38,water:19.0,capital:800,labor:130,speed:80,err:5,job:1,qual:91},human:{token:0,energy:0,water:0,capital:0,labor:1280,speed:1440,err:15,job:3,qual:78}}},
  {id:14,title:"New Hire Onboarding – Manufacturing Technician",category:"HR & Training",icon:"👷",recurring:false,desc:"A new precision machinist joins Assembly Cell 7. They need: safety orientation, system access provisioning for 6 platforms, equipment qualification scheduling, mentor assignment, and 30/60/90-day milestone tracking.",complexity:"Medium",volume:"Low (per hire)",safety:"Medium (safety training compliance)",context:"Mix of provisionable process steps and human elements — safety culture transfer, mentorship, belonging.",rec:"automation",insight:"Automate the process steps while humans own the relationship elements. Your new hire deserves a human champion, not a chatbot.",costs:{ai:{token:1.40,energy:0.12,water:6.3,capital:300,labor:120,speed:60,err:5,job:-2,qual:82},automation:{token:0,energy:0.003,water:0.08,capital:1800,labor:120,speed:30,err:3,job:-1,qual:90},augmented:{token:0.80,energy:0.07,water:3.5,capital:500,labor:100,speed:40,err:3,job:1,qual:91},human:{token:0,energy:0,water:0,capital:0,labor:640,speed:480,err:6,job:3,qual:88}}},
  {id:15,title:"ITAR Regulatory Change Impact Assessment",category:"Compliance",icon:"⚖️",recurring:false,desc:"New ITAR amendments affecting Category XV have been published. We must assess impact on 3 active international programs, existing export licenses, and our supply chain. The compliance window is 30 days.",complexity:"Very High",volume:"Low (one-time, existential risk)",safety:"Critical (federal legal exposure)",context:"Legal interpretation of federal regulations with national security implications. ITAR violations carry criminal penalties.",rec:"human",insight:"ITAR violations are federal crimes. AI cannot provide legal advice, cannot be held accountable, and cannot appear before a federal regulator. Your legal counsel and export compliance officers must lead this.",costs:{ai:{token:8.90,energy:0.78,water:39.2,capital:1500,labor:0,speed:120,err:25,job:-2,qual:52},automation:{token:0,energy:0,water:0,capital:0,labor:0,speed:0,err:99,job:-1,qual:2},augmented:{token:5.50,energy:0.48,water:24.0,capital:1200,labor:3800,speed:3800,err:4,job:1,qual:94},human:{token:0,energy:0,water:0,capital:0,labor:4800,speed:4320,err:5,job:3,qual:95}}},
  {id:"A1",title:"Hot-Fire Test Real-Time Safety Abort Monitoring",category:"Engineering",icon:"🛑",recurring:true,desc:"During hot-fire testing, 54 sensors sample at 10,000 Hz. If any parameter crosses a safety threshold, the system must trigger an emergency abort within 50 milliseconds — before a hard-start or over-pressure event can propagate.",complexity:"Very High",volume:"Very High (540K samples/second per test)",safety:"Critical — test stand and hardware safety",context:"Human reaction time is 200–400ms minimum — four to eight times too slow to intervene before a dangerous transient propagates. The abort logic must be autonomous.",rec:"ai",insight:"This is one of the clearest cases where AI Agent is not just better — it is the only responsible choice. Human reaction time is physically incapable of meeting the 50ms abort window. The AI monitors all 54 channels simultaneously and triggers abort faster than any human can perceive the event.",costs:{ai:{token:4.20,energy:0.38,water:19.0,capital:85000,labor:40,speed:0.05,err:0.5,job:-2,qual:99},automation:{token:0,energy:0.15,water:1.0,capital:120000,labor:40,speed:0.05,err:3,job:-1,qual:88},augmented:{token:4.20,energy:0.38,water:19.0,capital:85000,labor:200,speed:280,err:8,job:1,qual:61},human:{token:0,energy:0,water:0,capital:0,labor:480,speed:300,err:12,job:3,qual:42}}},
  {id:"A2",title:"Production Equipment Log Classification & Auto-Routing",category:"Maintenance",icon:"📊",recurring:true,desc:"Our factory network generates approximately 52,000 system log entries per day from 8 CNC machining centers, 3 assembly robots, the MES, and facility systems. Each entry needs to be classified and routed to the appropriate team queue.",complexity:"Medium",volume:"Very High (52,000 entries/day)",safety:"Medium",context:"The classification logic is pattern-based but far too varied for static automation rules. Human review of every entry is impossible. AI trained on historical fault data classifies the full volume in real time.",rec:"ai",insight:"At 52,000 entries per day, human review is not practical. Static rules miss the contextual patterns that precede failures. AI Agent processes the full volume in real time and surfaces rare failure signatures that sampling would miss.",costs:{ai:{token:5.80,energy:0.52,water:26.0,capital:18000,labor:20,speed:1,err:3,job:-2,qual:95},automation:{token:0,energy:0.06,water:0.4,capital:35000,labor:20,speed:1,err:22,job:-1,qual:63},augmented:{token:5.80,energy:0.52,water:26.0,capital:18000,labor:960,speed:480,err:4,job:1,qual:91},human:{token:0,energy:0,water:0,capital:0,labor:4800,speed:2880,err:14,job:3,qual:55}}},
  {id:"A3",title:"Multi-Source Demand Signal Aggregation – Materials Planning",category:"Production Planning",icon:"📡",recurring:true,desc:"Our 90-day rolling demand forecast depends on continuous aggregation of 220+ data sources: commodity spot prices, launch manifests, competitor announcements, weather at supplier locations, freight indices, and geopolitical risk signals. The system updates hundreds of times per day.",complexity:"High",volume:"Very High (220+ sources, continuous updates)",safety:"Low",context:"The value is speed and comprehensiveness — aggregating and correlating 220 sources in real time. Planners review the weekly summary and make manual overrides on major shifts.",rec:"ai",insight:"The Augmented Human model breaks down here because there are hundreds of micro-updates per day. AI continuously ingests, weights, and correlates signals faster than any human team could. Planners retain full override authority on major plan changes.",costs:{ai:{token:7.20,energy:0.65,water:32.5,capital:22000,labor:30,speed:1,err:4,job:-2,qual:94},automation:{token:0,energy:0.08,water:0.5,capital:45000,labor:30,speed:5,err:28,job:-1,qual:58},augmented:{token:7.20,energy:0.65,water:32.5,capital:22000,labor:1600,speed:240,err:5,job:1,qual:89},human:{token:0,energy:0,water:0,capital:0,labor:3200,speed:2880,err:18,job:3,qual:52}}},
  {id:16,title:"Product Roadmap Prioritization – Next-Gen Engine Variant",category:"Product Management",icon:"🗺️",recurring:false,desc:"Four active customer programs have submitted conflicting feature requests for our next-gen engine variant. We must publish a prioritized roadmap within 3 weeks.",complexity:"High",volume:"Low (one-time, strategic)",safety:"Low",context:"Feature prioritization involves customer relationship management, technical feasibility trade-offs, strategic market positioning, and engineering resource constraints.",rec:"augmented",insight:"AI can rapidly score and rank requirements across weighted criteria — surfacing trade-offs that would take a human PM weeks to model. But the final roadmap decision involves customer promises and engineering team commitment that only a human PM can own.",costs:{ai:{token:4.20,energy:0.38,water:19.0,capital:600,labor:0,speed:90,err:14,job:-2,qual:70},automation:{token:0,energy:0.02,water:0.2,capital:8000,labor:0,speed:120,err:22,job:-1,qual:55},augmented:{token:3.10,energy:0.28,water:14.0,capital:500,labor:480,speed:480,err:5,job:1,qual:92},human:{token:0,energy:0,water:0,capital:0,labor:1600,speed:2880,err:8,job:3,qual:88}}},

function buildDeck(){
  const picked=[...S].sort(()=>Math.random()-0.5).slice(0,15);
  const evs=[...EVENTS].sort(()=>Math.random()-0.5).slice(0,2);
  const pos=[];
  while(pos.length<2){const p=2+Math.floor(Math.random()*10);if(!pos.includes(p)&&!pos.includes(p-1)&&!pos.includes(p+1))pos.push(p);}
  pos.sort((a,b)=>a-b);
  const deck=[...picked];
  deck.splice(pos[0],0,evs[0]);
  deck.splice(pos[1]+1,0,evs[1]);
  return deck;
}

function fmt(k,v){
  if(k==="token"||k==="capital"||k==="labor") return v===0?"$0":`$${v%1===0?v:v.toFixed(2)}`;
  if(k==="energy") return `${v.toFixed(3)} kWh`;
  if(k==="water") return `${v.toFixed(1)} L`;
  if(k==="speed") return v===0?"N/A":v<60?`${v}m`:`${(v/60).toFixed(1)}h`;
  if(k==="err") return v===99?"N/A":`${v}%`;
  if(k==="job") return v>0?`+${v}▲`:`${v}▼`;
  if(k==="qual") return v<10?"Unsuitable":`${v}%`;
  return `${v}`;
}
function getBest(sc,k){
  const vals=Object.fromEntries(OKEYS.map(o=>[o,sc.costs[o][k]]));
  return GOODLOW.has(k)?OKEYS.reduce((a,b)=>vals[a]<=vals[b]?a:b):OKEYS.reduce((a,b)=>vals[a]>=vals[b]?a:b);
}
function computeCumulative(decisions,metric){
  const result=[],recurAdd=[];let running=0;
  decisions.forEach(d=>{recurAdd.forEach(c=>{running+=c;});running+=d.costs[metric];result.push(running);

}

           {icon:'⚡',l:'Energy Used',v:`${tEnergy.toFixed(2)} kWh`,s:`opt: ${optEnergy.toFixed(2)}`,c:'#fbbf24'},
           {icon:'💧',l:'Water Impact',v:`${tWater.toFixed(0)} L`,s:`opt: ${optWater.toFixed(0)} L`,c:'#60a5fa'},
           {icon:'🎯',l:'Avg Quality',v:`${avgQual.toFixed(0)}%`,s:'',c:'#34d399'},
           {icon:'👥',l:'Job Impact',v:`${tJob>=0?'+':''}${tJob}`,s:'',c:tJob>=0?'#34d399':'#ef4444'}
        ].map(card=>React.createElement('div',{key:card.l,style:{background:'#1e293b',borderRadius:10,padding:14,borderTop:`3px solid ${card.c}`,textAlign:'center'}},

          React.createElement('div',{style:{fontSize:10,color:'#64748b',marginBottom:4}},card.l),
          React.createElement('div',{style:{fontSize:16,fontWeight:700,color:'#f1f5f9'}},card.v),

        ))
      ),
      // Scatter charts
      React.createElement('div',{style:{background:'#1e293b',borderRadius:12,padding:18,marginBottom:20}},
        React.createElement('div',{style:{fontSize:10,color:'#94a3b8',fontWeight:700,letterSpacing:2,marginBottom:4}},`COST TRENDS — ALL ${n} DECISIONS`),
        React.createElement('div',{style:{fontSize:11,color:'#475569',marginBottom:16}},'Solid = per-decision · Dashed = cumulative · ',React.createElement('span',{style:{color:'#f97316'}},'▲ orange = disruption event')),
        ...[{label:'Energy (kWh)',vals:eVals,cum:eCum,color:'#fbbf24'},{label:'Water (L)',vals:wVals,cum:wCum,color:'#60a5fa'},{label:'Token Cost ($)',vals:tVals,cum:tCum,color:'#818cf8'}].map(m=>
          React.createElement('div',{key:m.label,style:{marginBottom:20}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',fontWeight:600,marginBottom:6}},
              React.createElement('span',null,m.label),
              React.createElement('span',{style:{color:m.color}},`Cumulative: ${m.cum[m.cum.length-1]?.toFixed(m.label.includes('Water')?1:3)}`)

            React.createElement(ScatterFull,{vals:m.vals,cumVals:m.cum,color:m.color,h:88,eventIdxs}),
            React.createElement('div',{style:{fontSize:9,color:'#334155',marginTop:2}},`↑ Step number (1–${n})`)

        )
      ),
      // Mix + Category
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}},
        React.createElement('div',{style:{background:'#1e293b',borderRadius:12,padding:18}},
          React.createElement('div',{style:{fontSize:10,color:'#94a3b8',fontWeight:700,letterSpacing:2,marginBottom:14}},'YOUR DECISION MIX'),

            React.createElement('div',{key:l,style:{marginBottom:13}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}},
                React.createElement('span',{style:{color:'#e2e8f0'}},l),
                React.createElement('span',{style:{color:col,fontWeight:700}},`${cnt} (${Math.round(cnt/n*100)}%)`)
              ),
              React.createElement('div',{style:{background:'#0f172a',borderRadius:99,height:6}},
                React.createElement('div',{style:{background:col,width:`${(cnt/n)*100}%`,height:6,borderRadius:99}})
              )
            )
          )
        ),
        React.createElement('div',{style:{background:'#1e293b',borderRadius:12,padding:18}},
          React.createElement('div',{style:{fontSize:10,color:'#94a3b8',fontWeight:700,letterSpacing:2,marginBottom:14}},'PERFORMANCE BY CATEGORY'),
          ...Object.entries(cats).map(([cat,d])=>{
            const pct=Math.round(d.ok/d.t*100),col=pct>=80?'#34d399':pct>=50?'#fbbf24':'#ef4444',isEv=cat==='Disruption Events';
            return React.createElement('div',{key:cat,style:{marginBottom:11}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}},
                React.createElement('span',{style:{color:isEv?'#f97316':'#e2e8f0'}},(isEv?'⚠️ ':'')+cat),
                React.createElement('span',{style:{color:col,fontWeight:700}},`${d.ok}/${d.t}`)
              ),
              React.createElement('div',{style:{background:'#0f172a',borderRadius:99,height:5}},
                React.createElement('div',{style:{background:col,width:`${pct}%`,height:5,borderRadius:99}})
              )
            );
          })
        )
      ),
      // Decision log
      React.createElement('div',{style:{background:'#1e293b',borderRadius:12,padding:18,marginBottom:20}},
        React.createElement('div',{style:{fontSize:10,color:'#94a3b8',fontWeight:700,letterSpacing:2,marginBottom:12}},'FULL DECISION REVIEW'),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'22px 2.2fr 1fr 1fr 96px 40px',gap:6,fontSize:10,color:'#475569',fontWeight:700,letterSpacing:1,marginBottom:8,paddingBottom:8,borderBottom:'1px solid #334155'}},
          React.createElement('span',null,'#'),React.createElement('span',null,'SCENARIO'),React.createElement('span',null,'YOUR CHOICE'),React.createElement('span',null,'OPTIMAL'),React.createElement('span',null,'OUTCOME'),React.createElement('span',null,'JOB')
        ),
        ...decisions.map((d,i)=>React.createElement('div',{key:i,style:{display:'grid',gridTemplateColumns:'22px 2.2fr 1fr 1fr 96px 40px',gap:6,fontSize:12,padding:'7px 0',borderBottom:`1px solid ${d.isEvent?'rgba(249,115,22,0.2)':'#1a2744'}`,alignItems:'center',background:d.isEvent?'rgba(249,115,22,0.04)':'transparent'}},
          React.createElement('span',{style:{color:d.isEvent?'#f97316':'#475569',fontSize:11,fontWeight:d.isEvent?700:400}},d.isEvent?'⚠':i+1),
          React.createElement('span',{style:{color:d.isEvent?'#fed7aa':'#e2e8f0',fontSize:12}},d.sc.length>46?d.sc.substring(0,46)+'…':d.sc),
          React.createElement('span',{style:{color:OPTS[d.choice].color,fontSize:11}},`${OPTS[d.choice].icon} ${d.choice==='augmented'?'Aug. Human':OPTS[d.choice].label}`),
          React.createElement('span',{style:{color:'#64748b',fontSize:11}},`${OPTS[d.rec].icon} ${d.rec==='augmented'?'Aug. Human':OPTS[d.rec].label}`),
          React.createElement('span',{style:{color:d.ok?'#34d399':'#ef4444',fontWeight:700,fontSize:10}},d.ok?'✓ OPTIMAL':'✗ SUBOPTIMAL'),
          React.createElement('span',{style:{color:d.costs.job>=0?'#34d399':'#f87171',fontSize:11,fontWeight:600}},`${d.costs.job>=0?'+':''}${d.costs.job}`)
        ))
      ),
      // Recommendations
      recs.length>0&&React.createElement('div',{style:{background:'#1e293b',borderRadius:12,padding:18,marginBottom:20}},
        React.createElement('div',{style:{fontSize:10,color:'#6366f1',fontWeight:700,letterSpacing:2,marginBottom:14}},'PERSONALIZED IMPROVEMENT RECOMMENDATIONS'),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          ...recs.map((r,i)=>React.createElement('div',{key:i,style:{background:'#0f172a',borderRadius:10,padding:16,borderLeft:`3px solid ${r.c}`}},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
              React.createElement('span',{style:{fontSize:18}},r.icon),
              React.createElement('span',{style:{fontSize:13,fontWeight:700,color:r.c}},r.t)
            ),
            React.createElement('div',{style:{fontSize:13,color:'#cbd5e1',lineHeight:1.65}},r.b)
          ))
        )
      ),
      // Restart
      React.createElement('div',{style:{textAlign:'center',marginBottom:20}},
        React.createElement('button',{onClick:onRestart,style:{padding:'13px 32px',background:'rgba(99,102,241,0.15)',border:'1px solid #6366f1',borderRadius:10,color:'#a5b4fc',fontWeight:700,fontSize:14,cursor:'pointer',letterSpacing:1}},`🔄 ${score>=70?'Run Again to Improve Score':'Retake the Simulation'}`),
        score<70&&React.createElement('div',{style:{marginTop:10,fontSize:13,color:'#64748b'}},'A score of 70% is required to earn a certificate. Review the recommendations above and try again.')
      ),
      // Certificate
      certDataURL&&React.createElement('div',{style:{marginBottom:24}},
        React.createElement('div',{style:{background:'linear-gradient(135deg,rgba(201,168,76,0.12),rgba(201,168,76,0.04))',border:'1px solid #c9a84c',borderRadius:12,padding:'18px 24px',marginBottom:16}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:14}},
            React.createElement('span',{style:{fontSize:28}},'🏆'),
            React.createElement('div',null,
              React.createElement('div',{style:{color:'#e8d48a',fontWeight:700,fontSize:15}},`Congratulations, ${userName}!`),
              React.createElement('div',{style:{color:'#94a3b8',fontSize:12,marginTop:3}},`You passed with ${score}%. Your certificate is ready below.`)
            )
          ),
          React.createElement('a',{href:certDataURL,download:'apex-propulsion-ai-certificate.png',style:{display:'inline-block',padding:'11px 22px',background:'linear-gradient(135deg,#c9a84c,#e8d48a)',borderRadius:10,color:'#0f172a',fontWeight:800,fontSize:13,textDecoration:'none',letterSpacing:1,whiteSpace:'nowrap'}},'📥 Download Certificate PNG')
        ),
        React.createElement('img',{src:certDataURL,alt:'Certificate of Completion',style:{width:'100%',borderRadius:12,border:'2px solid #c9a84c',display:'block'}})
      ),
      React.createElement('div',{style:{textAlign:'center',color:'#334155',fontSize:11,marginBottom:8}},'Apex Propulsion Systems · CTO Office · Responsible AI Operations Training Program · Confidential')
    )
  );
}
