<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Responsible AI Operations Training Simulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:#0f172a;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;min-height:100vh;}
  input,button,select{font-family:inherit;}
  button{cursor:pointer;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:#0f172a;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}

  /* ── Utility classes ── */
  .card{background:#1e293b;border-radius:12px;padding:16px;}
  .label{font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:2px;}

  /* ── Header ── */
  .sim-header{background:#1e293b;border-bottom:1px solid #334155;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-brand{display:flex;align-items:center;gap:8px;}
  .header-brand .rocket{font-size:18px;}
  .header-titles .co{font-size:9px;color:#94a3b8;letter-spacing:2px;display:none;}
  .header-titles .name{font-size:12px;font-weight:700;color:#f1f5f9;line-height:1.2;}
  .header-metrics{display:flex;gap:12px;align-items:center;}
  .hm{text-align:right;}
  .hm .hl{font-size:9px;color:#64748b;}
  .hm .hv{font-size:12px;font-weight:700;}
  .hm.hide-mobile{display:none;}

  /* ── Progress ── */
  .progress-bar{height:3px;background:#1e293b;}
  .progress-fill{height:3px;transition:width 0.5s;}

  /* ── Body layout ── */
  .sim-body{padding:14px;max-width:1200px;margin:0 auto;}
  .sim-grid{display:flex;flex-direction:column;gap:16px;}

  /* ── Category badge row ── */
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .cat-badge{padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:1px;}
  .rec-badge{padding:2px 8px;border-radius:20px;font-size:9px;letter-spacing:1px;}

  /* ── Scenario title ── */
  .sc-title{font-size:18px;font-weight:800;line-height:1.3;margin-bottom:12px;}

  /* ── Scenario card ── */
  .sc-card{border-radius:12px;padding:16px;margin-bottom:12px;}
  .sc-desc{margin:0 0 14px;color:#e2e8f0;line-height:1.7;font-size:14px;}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .meta-item{background:#0f172a;border-radius:8px;padding:8px 12px;}
  .meta-label{font-size:8px;color:#64748b;letter-spacing:1px;margin-bottom:2px;}
  .meta-val{font-size:12px;color:#e2e8f0;font-weight:500;}
  .context-box{padding:10px 14px;background:#0f172a;border-radius:8px;font-size:12px;color:#cbd5e1;font-style:italic;line-height:1.6;}

  /* ── Option buttons ── */
  .options-label{font-size:10px;color:#94a3b8;margin-bottom:10px;font-weight:700;letter-spacing:1px;}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt-btn{background:#1e293b;border:2px solid #334155;border-radius:12px;padding:16px 10px;color:#e2e8f0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color 0.2s,transform 0.2s;min-height:100px;touch-action:manipulation;}
  .opt-btn:active{transform:scale(0.97);}
  .opt-icon{font-size:26px;}
  .opt-name{font-weight:700;font-size:13px;}
  .opt-hint{font-size:10px;color:#475569;line-height:1.3;}

  /* ── Result banner ── */
  .result-banner{background:rgba(99,102,241,0.12);border:1px solid #6366f1;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .insight-box{border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px;}

  /* ── Cost table ── */
  .cost-table-wrap{background:#1e293b;border-radius:12px;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
  .cost-table{width:100%;min-width:420px;border-collapse:collapse;}
  .cost-table th{background:#0f172a;padding:8px 8px;font-size:9px;font-weight:700;color:#64748b;letter-spacing:0.5px;text-align:center;white-space:nowrap;}
  .cost-table th:first-child{text-align:left;}
  .cost-table td{padding:6px 8px;border-top:1px solid #0f172a;font-size:11px;text-align:center;}
  .cost-table td:first-child{text-align:left;color:#94a3b8;font-size:10px;white-space:nowrap;}
  .scroll-hint{font-size:9px;color:#334155;padding:4px 10px;text-align:right;display:none;}

  /* ── Next button ── */
  .next-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:white;font-weight:800;font-size:14px;letter-spacing:1px;touch-action:manipulation;}

  /* ── Sidebar / Stats panel ── */
  .stats-panel{display:flex;flex-direction:column;gap:12px;}
  .trend-section{background:#1e293b;border-radius:12px;padding:14px;}
  .totals-section{background:#1e293b;border-radius:12px;padding:14px;}
  .log-section{background:#1e293b;border-radius:12px;padding:14px;max-height:200px;overflow-y:auto;}
  .total-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;}
  .log-item{border-bottom:1px solid #334155;padding-bottom:8px;margin-bottom:8px;}

  /* ── Event banner ── */
  .event-banner{border-bottom:1px solid #f97316;padding:7px 16px;display:flex;align-items:center;gap:10px;}

  /* ── Debrief ── */
  .debrief-wrap{max-width:1020px;margin:0 auto;padding:20px 14px;}
  .score-header{text-align:center;margin-bottom:24px;}
  .score-big{font-size:56px;font-weight:900;line-height:1;}
  .summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  .sum-card{background:#1e293b;border-radius:10px;padding:12px;text-align:center;}
  .sum-card .sci{font-size:18px;margin-bottom:3px;}
  .sum-card .scl{font-size:9px;color:#64748b;margin-bottom:3px;}
  .sum-card .scv{font-size:14px;font-weight:700;color:#f1f5f9;}
  .sum-card .scs{font-size:9px;color:#475569;margin-top:2px;}
  .chart-section{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px;}
  .chart-item{margin-bottom:18px;}
  .chart-row{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:5px;}
  .two-col{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:16px;}
  .mix-bar{background:#0f172a;border-radius:99px;height:6px;margin-top:4px;}
  .mix-fill{height:6px;border-radius:99px;}
  .mix-row{margin-bottom:12px;}
  .mix-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
  .cat-bar{background:#0f172a;border-radius:99px;height:5px;margin-top:3px;}
  .review-table{width:100%;border-collapse:collapse;font-size:11px;}
  .review-table th{font-size:9px;color:#475569;font-weight:700;letter-spacing:1px;padding:6px 4px;border-bottom:1px solid #334155;text-align:left;}
  .review-table td{padding:6px 4px;border-bottom:1px solid #1a2744;vertical-align:middle;}
  .review-wrap{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .recs-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  .rec-card{background:#0f172a;border-radius:10px;padding:14px;}
  .rec-title{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .framework-grid{display:grid;grid-template-columns:1fr;gap:8px;}
  .fw-card{background:#0f172a;border-radius:8px;padding:12px;}
  .cert-section{margin-bottom:20px;}
  .cert-banner{border-radius:12px;padding:16px 18px;margin-bottom:14px;}
  .cert-img{width:100%;border-radius:10px;border:2px solid #c9a84c;display:block;}
  .restart-area{text-align:center;margin-bottom:18px;}
  .restart-btn{padding:12px 28px;background:rgba(99,102,241,0.15);border:1px solid #6366f1;border-radius:10px;color:#a5b4fc;font-weight:700;font-size:13px;}
  .footer-note{text-align:center;color:#334155;font-size:10px;margin-bottom:8px;}

  /* ── Register ── */
  .register-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .register-card{max-width:440px;width:100%;}
  .reg-inner{background:#1e293b;border-radius:14px;padding:24px;margin-bottom:14px;}
  .reg-input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 14px;color:#f1f5f9;font-size:16px;outline:none;transition:border-color 0.2s;}
  .reg-input:focus{border-color:#6366f1;}
  .reg-btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:800;font-size:15px;letter-spacing:1px;transition:all 0.2s;}

  /* ── Intro ── */
  .intro-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .intro-card{max-width:720px;width:100%;}
  .opts-intro{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .opt-intro-card{background:#1e293b;border-radius:12px;padding:14px;display:flex;gap:10px;}

  /* ── LAPTOP / TABLET breakpoint ── */
  @media(min-width:640px){
    .sim-body{padding:18px 20px;}
    .header-titles .co{display:block;}
    .header-titles .name{font-size:13px;}
    .hm.hide-mobile{display:block;}
    .hm .hl{font-size:10px;}
    .hm .hv{font-size:13px;}
    .sim-grid{display:grid;grid-template-columns:1fr 280px;gap:18px;}
    .sc-title{font-size:20px;}
    .sc-desc{font-size:15px;}
    .context-box{font-size:13px;}
    .scroll-hint{display:none !important;}
    .summary-cards{grid-template-columns:repeat(5,1fr);}
    .two-col{grid-template-columns:1fr 1fr;}
    .recs-grid{grid-template-columns:1fr 1fr;}
    .framework-grid{grid-template-columns:1fr 1fr 1fr;}
    .score-big{font-size:60px;}
    .cat-badge{font-size:10px;}
    .opt-btn{padding:18px 12px;min-height:110px;}
    .opt-icon{font-size:28px;}
    .opt-name{font-size:14px;}
    .cost-table th{font-size:10px;padding:9px 10px;}
    .cost-table td{font-size:11px;padding:7px 10px;}
  }

  @media(min-width:900px){
    .sim-body{padding:20px;}
    .header-metrics{gap:20px;}
    .hm .hl{font-size:10px;}
    .hm .hv{font-size:13px;}
  }

  /* Tiny phones */
  @media(max-width:380px){
    .opts-intro{grid-template-columns:1fr;}
    .options-grid{grid-template-columns:1fr;}
    .opt-btn{flex-direction:row;text-align:left;min-height:auto;padding:12px;}
    .opt-icon{font-size:22px;flex-shrink:0;}
    .summary-cards{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>

<script type="text/babel">
const {useState,useMemo,useEffect}=React;

function useIsMobile(){
  const [mob,setMob]=useState(()=>window.innerWidth<640);
  useEffect(()=>{
    const fn=()=>setMob(window.innerWidth<640);
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[]);
  return mob;
}

  {id:3,title:"Turbine Blade Post-Machining Inspection – QC Gate 4",category:"Quality Control",icon:"🔍",recurring:true,desc:"Post-machining inspection of turbine blades for micro-cracks, surface finish defects, and dimensional tolerances. Each batch is approximately 200 blades. Results feed into flight certification records compliant with AS9100 and FAA Part 21.",complexity:"High",volume:"Medium (200 blades/batch, 3x/week)",safety:"Critical — flight safety",context:"Defects can be subtle. Regulatory sign-off legally requires a certified inspector. AI vision can assist as a screening layer but cannot replace human sign-off on flight-critical parts.",rec:"human",insight:"Flight-critical inspection requires certified human inspectors — full stop. AS9100 and FAA regulations mandate human sign-off. Automating final judgment here creates catastrophic liability.",costs:{ai:{token:2.80,energy:0.22,water:11.0,capital:45000,labor:0,speed:25,err:6,job:-2,qual:79},automation:{token:0,energy:0.18,water:1.0,capital:120000,labor:0,speed:20,err:8,job:-1,qual:72},augmented:{token:1.80,energy:0.16,water:8.0,capital:35000,labor:160,speed:100,err:1.8,job:1,qual:96},human:{token:0,energy:0,water:0,capital:0,labor:280,speed:180,err:2,job:3,qual:97}}},

  {id:5,title:"Weld Anomaly Detection – Combustion Chamber Ultrasonic Data",category:"Quality Control",icon:"📡",recurring:true,desc:"Real-time ultrasonic inspection of combustion chamber welds generates approximately 850,000 data points per shift. We need to flag anomalies for human engineer review.",complexity:"Medium",volume:"Very High (850K data points/shift)",safety:"High",context:"AI as a screening and triage layer — NOT as final decision maker. Human engineers review all flagged anomalies.",rec:"augmented",insight:"Textbook Augmented Human: AI handles pattern recognition at massive scale, while engineers make every final call. Pure AI without human oversight creates unacceptable liability on flight-critical hardware.",costs:{ai:{token:8.40,energy:0.85,water:42.5,capital:15000,labor:0,speed:8,err:6,job:-2,qual:83},automation:{token:0,energy:0.12,water:0.8,capital:80000,labor:85,speed:10,err:12,job:-1,qual:78},augmented:{token:6.00,energy:0.60,water:30.0,capital:12000,labor:55,speed:9,err:1.5,job:1,qual:98},human:{token:0,energy:0,water:0,capital:0,labor:1200,speed:720,err:18,job:3,qual:62}}},
  {id:6,title:"AS9100 Monthly Quality Management Report",category:"Compliance",icon:"📄",recurring:true,desc:"Monthly AS9100 quality management report due to our certification body. Data is pulled from our QMS, formatted per a fixed template, and reviewed and signed by the Quality Manager before submission.",complexity:"Medium",volume:"Low (monthly, structured template)",safety:"Low",context:"Structured data in → structured formatted output. Standard template exists. Human sign-off required regardless of generation method.",rec:"automation",insight:"A well-built report automation template beats AI at a fraction of the cost. The Quality Manager must review and sign regardless — so the generation step should be as cheap and reliable as possible.",costs:{ai:{token:1.85,energy:0.16,water:8.2,capital:500,labor:45,speed:15,err:4,job:-2,qual:88},automation:{token:0,energy:0.003,water:0.1,capital:2500,labor:45,speed:8,err:2,job:-1,qual:94},augmented:{token:1.20,energy:0.10,water:5.0,capital:800,labor:35,speed:12,err:2,job:1,qual:93},human:{token:0,energy:0,water:0,capital:0,labor:320,speed:240,err:5,job:3,qual:90}}},
  {id:7,title:"Engine Hot-Fire Test Failure Root Cause Analysis",category:"Engineering",icon:"🔥",recurring:false,desc:"Hot-fire test #47 produced anomalous chamber pressure readings followed by a turbopump stall at T+4.2s. Formal root cause analysis is required before the program can continue. The test stand is currently down.",complexity:"Very High",volume:"Low (one incident, complex)",safety:"Critical",context:"Requires multi-disciplinary engineering expertise, physical intuition, hypothesis generation, and personal accountability. Wrong conclusions stop the program — or worse.",rec:"human",insight:"RCA of a safety-critical failure demands your best credentialed engineers. No AI system can be named as the responsible engineer on a failure investigation.",costs:{ai:{token:12.5,energy:1.10,water:55.0,capital:800,labor:0,speed:120,err:22,job:-2,qual:61},automation:{token:0,energy:0,water:0,capital:0,labor:0,speed:0,err:99,job:-1,qual:3},augmented:{token:9.0,energy:0.80,water:40.0,capital:1000,labor:2400,speed:2400,err:5,job:1,qual:95},human:{token:0,energy:0,water:0,capital:0,labor:3200,speed:2880,err:8,job:3,qual:94}}},

const OKEYS=["ai","automation","augmented","human"];
const MKEYS=["token","energy","water","capital","labor","speed","err","job","qual"];
const MLABELS={token:"Token ($)",energy:"Energy (kWh)",water:"Water (L)",capital:"Capital ($)",labor:"Labor ($)",speed:"Speed",err:"Error %",job:"Job Impact",qual:"Quality %"};
const GOODLOW=new Set(["token","energy","water","capital","labor","speed","err"]);

function buildDeck(){
  const picked=[...S].sort(()=>Math.random()-0.5).slice(0,15);
  const evs=[...EVENTS].sort(()=>Math.random()-0.5).slice(0,2);
  const pos=[];
  while(pos.length<2){const p=2+Math.floor(Math.random()*10);if(!pos.includes(p)&&!pos.includes(p-1)&&!pos.includes(p+1))pos.push(p);}
  pos.sort((a,b)=>a-b);
  const deck=[...picked];
  deck.splice(pos[0],0,evs[0]);
  deck.splice(pos[1]+1,0,evs[1]);
  return deck;
}

function fmt(k,v){
  if(k==="token"||k==="capital"||k==="labor") return v===0?"$0":`$${v%1===0?v:v.toFixed(2)}`;
  if(k==="energy") return `${v.toFixed(3)}`;
  if(k==="water") return `${v.toFixed(1)}`;
  if(k==="speed") return v===0?"N/A":v<60?`${v}m`:`${(v/60).toFixed(1)}h`;
  if(k==="err") return v===99?"N/A":`${v}%`;
  if(k==="job") return v>0?`+${v}`:`${v}`;
  if(k==="qual") return v<10?"N/A":`${v}%`;
  return `${v}`;
}
function getBest(sc,k){
  const vals=Object.fromEntries(OKEYS.map(o=>[o,sc.costs[o][k]]));
  return GOODLOW.has(k)?OKEYS.reduce((a,b)=>vals[a]<=vals[b]?a:b):OKEYS.reduce((a,b)=>vals[a]>=vals[b]?a:b);
}
function computeCumulative(decisions,metric){
  const result=[],recurAdd=[];let running=0;
  decisions.forEach(d=>{recurAdd.forEach(c=>{running+=c;});running+=d.costs[metric];result.push(running);
    if(d.recurring&&(d.choice==="ai"||d.choice==="automation"))recurAdd.push(d.costs[metric]);});
  return result;
}

          React.createElement('div',{className:'sc-title',style:{color:isEvent?'#fed7aa':'#f8fafc'}},sc.title),
          // Scenario card
          React.createElement('div',{className:'sc-card',style:{background:isEvent?'rgba(249,115,22,0.06)':'#1e293b',border:isEvent?'1px solid rgba(249,115,22,0.3)':'none',marginBottom:12}},
            React.createElement('p',{className:'sc-desc'},sc.desc),
            React.createElement('div',{className:'meta-grid'},
              ...([['Complexity',sc.complexity],['Volume',sc.volume],['Safety',sc.safety]]).map(([l,v])=>
                React.createElement('div',{className:'meta-item',key:l},
                  React.createElement('div',{className:'meta-label'},l.toUpperCase()),
                  React.createElement('div',{className:'meta-val'},v)
                )
              )
            ),
            React.createElement('div',{className:'context-box',style:{borderLeft:`3px solid ${isEvent?'#f97316':'#475569'}`}},sc.context)
          ),
          // Choices
          !showResult&&React.createElement('div',null,
            React.createElement('div',{className:'options-label'},'SELECT YOUR APPROACH:'),
            React.createElement('div',{className:'options-grid'},
              ...OKEYS.map(k=>{const o=OPTS[k];return React.createElement('button',{key:k,className:'opt-btn',onClick:()=>choose(k),
                onTouchStart:e=>e.currentTarget.style.borderColor=o.color,
                onTouchEnd:e=>e.currentTarget.style.borderColor='#334155',
                onMouseOver:e=>e.currentTarget.style.borderColor=o.color,
                onMouseOut:e=>e.currentTarget.style.borderColor='#334155'},
                React.createElement('span',{className:'opt-icon'},o.icon),
                React.createElement('span',{className:'opt-name',style:{color:o.color}},o.label),
                React.createElement('span',{className:'opt-hint'},k==='augmented'?'AI analysis + human critical review':'Click to select')
              );})
            )
          ),
          // Result
          showResult&&React.createElement('div',null,
            React.createElement('div',{className:'result-banner'},
              React.createElement('span',{style:{fontSize:20}},'📊'),
              React.createElement('div',null,
                React.createElement('div',{style:{fontWeight:700,color:'#a5b4fc',fontSize:13}},`You chose: ${OPTS[chosen].icon} ${OPTS[chosen].label}`),
                React.createElement('div',{style:{fontSize:11,color:'#94a3b8',marginTop:2}},'Review the cost data below. Optimal choices revealed in the final debrief.')
              )
            ),
            React.createElement('div',{className:'insight-box',style:{borderLeft:`4px solid ${isEvent?'#f97316':'#6366f1'}`}},
              React.createElement('div',{style:{fontSize:9,color:isEvent?'#f97316':'#6366f1',fontWeight:700,marginBottom:6,letterSpacing:1}},'TRAINING INSIGHT'),
              React.createElement('p',{style:{margin:0,color:'#e2e8f0',lineHeight:1.65,fontSize:13}},sc.insight)
            ),
            // Cost table
            React.createElement('div',{className:'cost-table-wrap'},
              React.createElement('div',{className:'scroll-hint',style:{display:'block'}},'← Scroll to see all options →'),
              React.createElement('table',{className:'cost-table'},
                React.createElement('thead',null,
                  React.createElement('tr',null,
                    React.createElement('th',null,'Metric'),
                    ...OKEYS.map(o=>React.createElement('th',{key:o,style:{color:OPTS[o].color}},`${OPTS[o].icon} ${o==='augmented'?'Aug.':OPTS[o].label.split(' ')[0]}`))
                  )
                ),
                React.createElement('tbody',null,
                  ...MKEYS.map(k=>{const best=getBest(sc,k);return React.createElement('tr',{key:k},
                    React.createElement('td',null,MLABELS[k]),
                    ...OKEYS.map(opt=>{const isC=opt===chosen,isB=opt===best;
                      return React.createElement('td',{key:opt,style:{fontWeight:isC?700:400,color:isB?'#34d399':isC?'#f1f5f9':'#4b5563',background:isC?'rgba(99,102,241,0.18)':'transparent',borderRadius:3}},
                        fmt(k,sc.costs[opt][k])+(isB?' ★':'')
                      );
                    })
                  );})
                )
              )
            ),
            React.createElement('button',{className:'next-btn',onClick:next},idx+1<total?'NEXT SCENARIO →':'VIEW FULL DEBRIEF →')
          )
        ),
        // Sidebar (desktop only — mobile uses drawer above)
        !isMobile&&statsPanel
      )
    )
  );
}

// ── Debrief ──────────────────────────────────────────────────────────────────
function Debrief({decisions,onRestart,userName}){
  const isMobile=useIsMobile();
  const n=decisions.length,ok=decisions.filter(d=>d.ok).length,score=Math.round((ok/n)*100);
  const evOk=decisions.filter(d=>d.isEvent&&d.ok).length,evN=decisions.filter(d=>d.isEvent).length;
  const tToken=decisions.reduce((s,d)=>s+d.costs.token,0);
  const tEnergy=decisions.reduce((s,d)=>s+d.costs.energy,0);
  const tWater=decisions.reduce((s,d)=>s+d.costs.water,0);
  const tJob=decisions.reduce((s,d)=>s+d.costs.job,0);
  const avgQual=decisions.reduce((s,d)=>s+d.costs.qual,0)/n;
  const optToken=decisions.reduce((s,d)=>s+d.optCosts.token,0);
  const optEnergy=decisions.reduce((s,d)=>s+d.optCosts.energy,0);
  const optWater=decisions.reduce((s,d)=>s+d.optCosts.water,0);
  const aiN=decisions.filter(d=>d.choice==='ai').length;
  const autoN=decisions.filter(d=>d.choice==='automation').length;
  const augN=decisions.filter(d=>d.choice==='augmented').length;
  const humanN=decisions.filter(d=>d.choice==='human').length;
  const cats={};
  decisions.forEach(d=>{const cat=d.isEvent?'Disruption Events':d.cat;if(!cats[cat])cats[cat]={t:0,ok:0};cats[cat].t++;if(d.ok)cats[cat].ok++;});
  const grade=score>=87?{g:'EXPERT',c:'#34d399',sub:'Mastery-level judgment.'}
    :score>=73?{g:'PROFICIENT',c:'#fbbf24',sub:'Solid grasp with a few areas to sharpen.'}
    :score>=53?{g:'DEVELOPING',c:'#f97316',sub:'Basics understood — one approach over-applied.'}
    :{g:'NEEDS IMPROVEMENT',c:'#ef4444',sub:'Significant pattern issues. Review the framework.'};
  const eVals=decisions.map(d=>d.costs.energy),wVals=decisions.map(d=>d.costs.water),tVals=decisions.map(d=>d.costs.token);
  const eCum=computeCumulative(decisions,'energy'),wCum=computeCumulative(decisions,'water'),tCum=computeCumulative(decisions,'token');
  const eventIdxs=decisions.map((d,i)=>d.isEvent?i:-1).filter(i=>i>=0);
  const certDataURL=useMemo(()=>score>=70?generateCertDataURL(score,ok,n,userName):null,[]);
  const recs=[
    aiN>5&&{icon:'⚠️',c:'#f59e0b',t:'Over-reliance on AI Agents',b:'You reached for AI too often on tasks where automation is faster, cheaper, and equally reliable.'},
    augN===0&&{icon:'🧠',c:'#f472b6',t:'Augmented Human was never used',b:'Several scenarios are best handled by AI analysis with human review. Ignoring this option means either over-automating or under-leveraging AI.'},
    evOk<evN&&{icon:'⚠️',c:'#f97316',t:'Disruption Event decisions need work',b:`You answered ${evOk} of ${evN} disruption events optimally. Crisis situations often require Augmented Human or Human approaches.`},
    humanN<2&&{icon:'👥',c:'#60a5fa',t:'Human judgment was under-deployed',b:'For flight-critical inspection, ITAR compliance, and go/no-go decisions — humans are non-negotiable.'},
    autoN<4&&{icon:'⚡',c:'#34d399',t:'Basic automation was under-used',b:'EOQ calculations, Kanban updates, inventory alerts, and invoice matching require repeatability, not intelligence.'},
    tJob<0&&{icon:'👷',c:'#fbbf24',t:'Net negative workforce impact',b:`Cumulative job impact: ${tJob}. Responsible AI deployment means planning actively for workforce transitions.`},
    score>=87&&{icon:'🏆',c:'#34d399',t:'Expert-level decision-making',b:'You correctly matched tasks to approaches that add genuine value and respected human oversight requirements throughout.'}
  ].filter(Boolean);

  return React.createElement('div',{style:{background:'#0f172a',minHeight:'100vh'}},
    // Mini header
    React.createElement('div',{style:{background:'#1e293b',borderBottom:'1px solid #334155',padding:'10px 16px',display:'flex',alignItems:'center',gap:10}},
      React.createElement('span',{style:{fontSize:18}},'🚀'),
      React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f1f5f9'}},'Responsible AI Operations Training Simulator')
    ),
    React.createElement('div',{className:'debrief-wrap'},
      // Score
      React.createElement('div',{className:'score-header'},
        React.createElement('div',{style:{fontSize:10,color:'#6366f1',letterSpacing:3,marginBottom:6}},'PERFORMANCE DEBRIEF'),
        React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#f8fafc',marginBottom:8}},'Apex Propulsion Systems'),
        React.createElement('div',{className:'score-big',style:{color:grade.c}},`${score}%`),
        React.createElement('div',{style:{fontSize:14,color:grade.c,fontWeight:700,letterSpacing:2,marginBottom:4}},grade.g),
        React.createElement('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:2}},grade.sub),
        React.createElement('div',{style:{fontSize:11,color:'#64748b'}},`${ok} of ${n} optimal · ${evOk}/${evN} disruption events correct`)
      ),
      // Summary cards — 3 col on mobile, 5 on desktop
      React.createElement('div',{className:'summary-cards'},
        ...[{icon:'💰',l:'Tokens',v:`$${tToken.toFixed(2)}`,s:`opt: $${optToken.toFixed(2)}`,c:'#818cf8'},
           {icon:'⚡',l:'Energy',v:`${tEnergy.toFixed(1)} kWh`,s:`opt: ${optEnergy.toFixed(1)}`,c:'#fbbf24'},
           {icon:'💧',l:'Water',v:`${tWater.toFixed(0)} L`,s:`opt: ${optWater.toFixed(0)}`,c:'#60a5fa'},
           {icon:'🎯',l:'Avg Quality',v:`${avgQual.toFixed(0)}%`,s:'',c:'#34d399'},
           {icon:'👥',l:'Job Impact',v:`${tJob>=0?'+':''}${tJob}`,s:'',c:tJob>=0?'#34d399':'#ef4444'}
        ].map(card=>React.createElement('div',{key:card.l,className:'sum-card',style:{borderTop:`3px solid ${card.c}`}},
          React.createElement('div',{className:'sci'},card.icon),
          React.createElement('div',{className:'scl'},card.l),
          React.createElement('div',{className:'scv'},card.v),
          card.s&&React.createElement('div',{className:'scs'},card.s)
        ))
      ),
      // Charts
      React.createElement('div',{className:'chart-section'},
        React.createElement('div',{className:'label',style:{marginBottom:4}},`COST TRENDS — ALL ${n} DECISIONS`),
        React.createElement('div',{style:{fontSize:10,color:'#475569',marginBottom:14}},'Solid = per-decision · Dashed = cumulative · ',React.createElement('span',{style:{color:'#f97316'}},'▲ = disruption event')),
        ...[{label:'Energy (kWh)',vals:eVals,cum:eCum,color:'#fbbf24'},{label:'Water (L)',vals:wVals,cum:wCum,color:'#60a5fa'},{label:'Token Cost ($)',vals:tVals,cum:tCum,color:'#818cf8'}].map(m=>
          React.createElement('div',{key:m.label,className:'chart-item'},
            React.createElement('div',{className:'chart-row'},
              React.createElement('span',null,m.label),
              React.createElement('span',{style:{color:m.color}},`Total: ${m.cum[m.cum.length-1]?.toFixed(m.label.includes('Water')?1:2)}`)
            ),
            React.createElement(ScatterFull,{vals:m.vals,cumVals:m.cum,color:m.color,h:isMobile?70:85,eventIdxs}),
            React.createElement('div',{style:{fontSize:9,color:'#334155',marginTop:2}},`↑ Step 1–${n}`)
          )
        )
      ),
      // Mix + Categories
      React.createElement('div',{className:'two-col',style:{marginBottom:14}},
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'label',style:{marginBottom:12}},'YOUR DECISION MIX'),
          ...[['🤖 AI Agent',aiN,'#818cf8'],['⚡ Basic Automation',autoN,'#34d399'],['🧠 Augmented Human',augN,'#f472b6'],['👤 Human Worker',humanN,'#fbbf24']].map(([l,cnt,c])=>
            React.createElement('div',{key:l,className:'mix-row'},
              React.createElement('div',{className:'mix-label'},
                React.createElement('span',{style:{color:'#e2e8f0',fontSize:12}},l),
                React.createElement('span',{style:{color:c,fontWeight:700,fontSize:12}},`${cnt} (${Math.round(cnt/n*100)}%)`)
              ),
              React.createElement('div',{className:'mix-bar'},React.createElement('div',{className:'mix-fill',style:{background:c,width:`${(cnt/n)*100}%`}}))
            )
          )
        ),
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'label',style:{marginBottom:12}},'PERFORMANCE BY CATEGORY'),
          ...Object.entries(cats).map(([cat,d])=>{
            const pct=Math.round(d.ok/d.t*100),c=pct>=80?'#34d399':pct>=50?'#fbbf24':'#ef4444',isEv=cat==='Disruption Events';
            return React.createElement('div',{key:cat,className:'mix-row'},
              React.createElement('div',{className:'mix-label'},
                React.createElement('span',{style:{color:isEv?'#f97316':'#e2e8f0',fontSize:12}},(isEv?'⚠️ ':'')+cat),
                React.createElement('span',{style:{color:c,fontWeight:700,fontSize:12}},`${d.ok}/${d.t}`)
              ),
              React.createElement('div',{className:'cat-bar'},React.createElement('div',{style:{background:c,width:`${pct}%`,height:5,borderRadius:99}}))
            );
          })
        )
      ),
      // Decision review table
      React.createElement('div',{className:'review-wrap'},
        React.createElement('div',{className:'label',style:{marginBottom:10}},'FULL DECISION REVIEW'),
        React.createElement('table',{className:'review-table'},
          React.createElement('thead',null,React.createElement('tr',null,
            React.createElement('th',null,'#'),
            React.createElement('th',null,'SCENARIO'),
            React.createElement('th',null,'YOUR CHOICE'),
            React.createElement('th',null,'OPTIMAL'),
            React.createElement('th',null,'RESULT'),
            React.createElement('th',null,'JOB')
          )),
          React.createElement('tbody',null,
            ...decisions.map((d,i)=>React.createElement('tr',{key:i,style:{background:d.isEvent?'rgba(249,115,22,0.04)':'transparent'}},
              React.createElement('td',{style:{color:d.isEvent?'#f97316':'#475569',fontWeight:d.isEvent?700:400}},d.isEvent?'⚠':i+1),
              React.createElement('td',{style:{color:d.isEvent?'#fed7aa':'#e2e8f0'}},d.sc.length>30?d.sc.substring(0,30)+'…':d.sc),
              React.createElement('td',{style:{color:OPTS[d.choice].color,whiteSpace:'nowrap'}},`${OPTS[d.choice].icon} ${d.choice==='augmented'?'Aug.':OPTS[d.choice].label.split(' ')[0]}`),
              React.createElement('td',{style:{color:'#64748b',whiteSpace:'nowrap'}},`${OPTS[d.rec].icon} ${d.rec==='augmented'?'Aug.':OPTS[d.rec].label.split(' ')[0]}`),
              React.createElement('td',{style:{color:d.ok?'#34d399':'#ef4444',fontWeight:700,whiteSpace:'nowrap'}},d.ok?'✓ OK':'✗ Sub'),
              React.createElement('td',{style:{color:d.costs.job>=0?'#34d399':'#f87171',fontWeight:600}},`${d.costs.job>=0?'+':''}${d.costs.job}`)
            ))
          )
        )
      ),
      // Recommendations
      recs.length>0&&React.createElement('div',{className:'card',style:{marginBottom:14}},
        React.createElement('div',{className:'label',style:{marginBottom:12}},'PERSONALIZED RECOMMENDATIONS'),
        React.createElement('div',{className:'recs-grid'},
          ...recs.map((r,i)=>React.createElement('div',{key:i,className:'rec-card',style:{borderLeft:`3px solid ${r.c}`}},
            React.createElement('div',{className:'rec-title'},
              React.createElement('span',{style:{fontSize:16}},r.icon),
              React.createElement('span',{style:{fontSize:12,fontWeight:700,color:r.c}},r.t)
            ),
            React.createElement('div',{style:{fontSize:12,color:'#cbd5e1',lineHeight:1.6}},r.b)
          ))
        )
      ),
      // Restart
      React.createElement('div',{className:'restart-area'},
        React.createElement('button',{className:'restart-btn',onClick:onRestart},`🔄 ${score>=70?'Run Again to Improve Score':'Retake the Simulation'}`),
        score<70&&React.createElement('div',{style:{marginTop:8,fontSize:12,color:'#64748b'}},'A score of 70% is required to earn a certificate. Try again — each run draws a fresh scenario mix.')
      ),
      // Certificate
      certDataURL&&React.createElement('div',{className:'cert-section'},
        React.createElement('div',{className:'cert-banner',style:{background:'linear-gradient(135deg,rgba(201,168,76,0.12),rgba(201,168,76,0.04))',border:'1px solid #c9a84c'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},
            React.createElement('span',{style:{fontSize:24}},'🏆'),
            React.createElement('div',null,
              React.createElement('div',{style:{color:'#e8d48a',fontWeight:700,fontSize:14}},`Congratulations, ${userName}!`),
              React.createElement('div',{style:{color:'#94a3b8',fontSize:12,marginTop:2}},`You passed with ${score}%. Your certificate is below.`)
            )
          ),
          React.createElement('a',{href:certDataURL,download:'apex-propulsion-ai-certificate.png',
            style:{display:'inline-block',padding:'11px 22px',background:'linear-gradient(135deg,#c9a84c,#e8d48a)',borderRadius:10,color:'#0f172a',fontWeight:800,fontSize:13,textDecoration:'none',letterSpacing:1}},
            '📥 Download Certificate PNG')
        ),
        React.createElement('img',{src:certDataURL,className:'cert-img',alt:'Certificate of Completion'})
      ),
      React.createElement('div',{className:'footer-note'},'Apex Propulsion Systems · CTO Office · Responsible AI Operations Training · Confidential')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
